<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Student Portfolio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">MyPortfolio</div>
    <nav>
      <input type="checkbox" id="nav-toggle" class="nav-toggle" />
      <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Me</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="planner.html">Academic Planner</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>
  <main class="page">
    <h1>Get in Touch</h1>
    <p class="lead">Have a question or want to collaborate? Send me a message.</p>
    <form id="contact-form" class="contact-form" novalidate>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" />
        <small class="error" data-error-for="name"></small>
      </div>
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" />
        <small class="error" data-error-for="email"></small>
      </div>
      <div class="field">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" />
        <small class="error" data-error-for="phone"></small>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5"></textarea>
        <small class="error" data-error-for="message"></small>
      </div>
      <button type="submit" class="btn">Send Message</button>
      <p id="form-success" class="success" hidden>Thanks! Your message has been sent.</p>
    </form>
  </main>
  <footer><p>&copy; 2026 Ototo Godwin. All rights reserved.</p></footer>
  <script src="script.js"></script>
</body>
</html>
